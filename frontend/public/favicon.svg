<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- Coffee Crema (Light Beige) -->
  <rect x="4" y="4" width="7" height="1" fill="#d7ccc8" />
  
  <!-- Coffee Liquid (Brown) -->
  <rect x="4" y="5" width="7" height="7" fill="#795548" />
  <rect x="5" y="12" width="5" height="1" fill="#795548" />

  <!-- Cup Outline -->
  <!-- Top lip rim -->
  <rect x="3" y="3" width="8" height="1" fill="#E2E2E2" />
  <rect x="11" y="3" width="1" height="1" fill="#B5B5B5" />

  <!-- Left wall -->
  <rect x="3" y="4" width="1" height="4" fill="#FFFFFF" />
  <rect x="3" y="8" width="1" height="4" fill="#E2E2E2" />

  <!-- Right wall -->
  <rect x="11" y="4" width="1" height="8" fill="#B5B5B5" />

  <!-- Bottom slants -->
  <rect x="4" y="12" width="1" height="1" fill="#E2E2E2" />
  <rect x="5" y="13" width="1" height="1" fill="#B5B5B5" />
  <rect x="10" y="12" width="1" height="1" fill="#8A8A8A" />
  <rect x="9" y="13" width="1" height="1" fill="#8A8A8A" />

  <!-- Bottom base -->
  <rect x="6" y="13" width="3" height="1" fill="#8A8A8A" />

  <!-- Handle -->
  <rect x="12" y="4" width="1" height="1" fill="#B5B5B5" />
  <rect x="13" y="5" width="1" height="3" fill="#FFFFFF" />
  <rect x="13" y="8" width="1" height="2" fill="#B5B5B5" />
  <rect x="12" y="10" width="1" height="1" fill="#8A8A8A" />
</svg>